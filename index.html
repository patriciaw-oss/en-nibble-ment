    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:#00B14F;--gd:#007a36;--gl:#e6f7ee;
      --bg:#f0f2f5;--w:#fff;--border:#e0e6ed;
      --text:#1a1a2e;--mid:#556;--light:#9aa;
      --shadow:0 4px 24px rgba(0,0,0,.09);--r:18px;
      --grab-orange:#ff5200;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);height:100vh;display:flex;align-items:center;justify-content:center}
    .app{width:450px;max-width:100vw;height:94vh;max-height:880px;background:var(--w);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}

    /* ── Header ── */
    .hdr{background:linear-gradient(135deg,#00B14F 0%,#007a36 100%);padding:14px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0}
    .hdr-av{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .hdr-info h1{color:#fff;font-size:15px;font-weight:700}
    .hdr-info p{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px}
    .hdr-r{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
    .hbadge{background:rgba(255,255,255,.18);color:#fff;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px}
    .hpeak{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
    .hpeak.red{background:rgba(220,50,50,.3);color:#ffaaaa}
    .hpeak.yellow{background:rgba(255,200,0,.25);color:#ffe066}
    .hpeak.green{background:rgba(100,255,150,.2);color:#aaffcc}

    /* ── Chat ── */
    .chat{flex:1;overflow-y:auto;padding:16px 13px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
    .chat::-webkit-scrollbar{width:3px}
    .chat::-webkit-scrollbar-thumb{background:#dde;border-radius:3px}

    /* ── Messages ── */
    .row{display:flex;align-items:flex-end;gap:7px;animation:fu .2s ease}
    .row.user{flex-direction:row-reverse}
    @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bicon{width:27px;height:27px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .bub{max-width:80%;padding:10px 13px;border-radius:var(--r);font-size:13.5px;line-height:1.55;color:var(--text)}
    .bub.bot{background:var(--w);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .bub.user{background:var(--g);color:#fff;border-bottom-right-radius:4px}
    .bub.grab-bub{background:#fff5f0;border:1.5px solid #ff5200;border-bottom-left-radius:4px}

    /* ── Typing ── */
    .typing{display:flex;align-items:flex-end;gap:7px}
    .tdots{background:var(--w);border:1px solid var(--border);border-bottom-left-radius:4px;padding:10px 14px;border-radius:var(--r);display:flex;gap:5px;align-items:center}
    .tdots span{width:6px;height:6px;background:#bbc;border-radius:50%;animation:bo 1.2s infinite}
    .tdots span:nth-child(2){animation-delay:.2s}
    .tdots span:nth-child(3){animation-delay:.4s}
    @keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ── Quick replies ── */
    .qr{display:flex;flex-wrap:wrap;gap:6px;padding:3px 13px 11px;animation:fu .25s ease}
    .qb{background:var(--w);border:1.5px solid var(--g);color:var(--g);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .qb:hover{background:var(--g);color:#fff}
    .qb.grab-qb{border-color:var(--grab-orange);color:var(--grab-orange)}
    .qb.grab-qb:hover{background:var(--grab-orange);color:#fff}

    /* ── Input ── */
    .inp-wrap{padding:9px 13px 13px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
    .inp-wrap input{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:9px 15px;font-size:13.5px;outline:none;color:var(--text);transition:border .2s}
    .inp-wrap input:focus{border-color:var(--g)}
    .inp-wrap input::placeholder{color:var(--light)}
    .sbtn{width:40px;height:40px;background:var(--g);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
    .sbtn:hover{background:var(--gd)}
    .sbtn svg{fill:#fff}

    /* ── Restaurant Card ── */
    .rc{background:var(--w);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-top:5px;transition:box-shadow .2s,border-color .2s}

    .rc-head.grab-head{background:#fff5f0}
    .rc-name{font-weight:700;font-size:13.5px;color:var(--text);line-height:1.3}
    .rc-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .rc-price{font-weight:700;font-size:12px;color:var(--gd)}
    .rc-rating{font-size:12px;font-weight:700;color:#e67e00}

    .rc-pt.warn{background:#fdecea;color:#b71c1c}
    .pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
    .pl{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:20px}

    .pl.drive{background:#e3f2fd;color:#1565c0}
    .pl.t{background:#fff3e0;color:#e65100}
    .pl.vb{background:#f3e5f5;color:#7b1fa2}
    .pl.h{background:#e3f2fd;color:#1565c0}
    .pl.gr{background:#e6f7ee;color:#00803a}
    .pl.gp{background:#fce4ec;color:#c62828}
    .pl.dl{background:#fffde7;color:#f57f17}
    .pl.ar{background:#f0f4ff;color:#3949ab}

    .grab-open-btn{display:inline-block;background:#ff5200;color:#fff;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:20px;cursor:pointer;margin-top:4px;border:none;transition:background .2s}

// ─── Peak time ────────────────────────────────────────────────────────────────
function getPeak() {
  const now = new Date(), h = now.getHours(), m = now.getMinutes();
  const mins = h*60+m, wd = now.getDay(), weekend = wd===0||wd===6;
  if (weekend) {
    if (mins>=720&&mins<=900) return {level:'red',label:'🔴 Weekend Peak',note:'Busy 12–3 PM weekends. Expect 20–30 min waits.'};
    if (mins>=660&&mins<=960) return {level:'yellow',label:'🟡 Getting Busy',note:'Moderate weekend crowds.'};
  } else {
    if (mins>=720&&mins<=810) return {level:'red',label:'🔴 Lunch Rush',note:'Peak 12–1:30 PM. Food courts fastest; sit-down adds 15–25 min.'};
    if (mins>=1080&&mins<=1260) return {level:'yellow',label:'🟡 Dinner Rush',note:'Peak 6–9 PM. Popular spots fill up fast — book ahead.'};
    if (mins>=660&&mins<=840) return {level:'yellow',label:'🟡 Pre/Post Rush',note:'Slightly busy. Aim before 11:45 AM or after 1:30 PM.'};
  }
  return {level:'green',label:'🟢 Off-Peak',note:'Good timing — minimal waits expected.'};
}

pb.textContent = PEAK.label; pb.className = 'hpeak '+PEAK.level;

function matchDish(input) {
  const q = input.toLowerCase().trim();
  for (const entry of DISH_MAP) {
    if (entry.keys.some(k => q.includes(k) || k.includes(q))) {
      return entry;
    }
  }
  return null;
}

function getCuisineSubOptions(r) {
  const subs = CUISINE_SUBS[r.cuisine];
  if (subs) return subs;
  // Fallback: extract first word of cuisine as search
  const fallback = r.cuisine.split('/')[0].split(' ')[0].toLowerCase();
  return [{l:`More ${r.cuisine}`, v: fallback}];
}

// ─── Time helpers ─────────────────────────────────────────────────────────────
function fmtTime(h) {
  const hour = Math.floor(h), min = Math.round((h - hour) * 60);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12 = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
  return min > 0 ? `${h12}:${String(min).padStart(2,'0')} ${ampm}` : `${h12} ${ampm}`;
}

function getOpenStatus(id) {
  const h = HOURS[id];
  if (!h) return {status:'unknown', label:'', pill:''};
  const now = new Date();
  const day = now.getDay(), t = now.getHours() + now.getMinutes() / 60;

  if (!h.days.includes(day))
    return {status:'closed', label:'Closed today',
      pill:`<span style="background:#fdecea;color:#b71c1c;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🚫 Closed today</span>`};

  // Table & Apron style: extended hours on certain days
  let open = h.open;
  if (h.extDays && h.extDays.includes(day)) open = h.extOpen;

  if (t < open - 0.75)
    return {status:'not-yet', label:`Opens ${fmtTime(open)}`,
      pill:`<span style="background:#e3f2fd;color:#1565c0;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🕐 Opens ${fmtTime(open)}</span>`};

  if (t < open)
    return {status:'opening-soon', label:`Opens soon — ${fmtTime(open)}`,
      pill:`<span style="background:#fffde7;color:#b45309;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🟡 Opens ${fmtTime(open)}</span>`};

  if (t >= h.close)
    return {status:'closed', label:'Closed now',
      pill:`<span style="background:#fdecea;color:#b71c1c;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🚫 Closed now</span>`};

  if (t >= h.close - 0.75)
    return {status:'closing-soon', label:`Closing at ${fmtTime(h.close)}`,
      pill:`<span style="background:#fff3e0;color:#c2440a;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">⚠️ Closing ${fmtTime(h.close)}</span>`};

  return {status:'open', label:`Open till ${fmtTime(h.close)}`,
    pill:`<span style="background:#e8f5e9;color:#2e7d32;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">✅ Open till ${fmtTime(h.close)}</span>`};
}

// ─── Exclusion handler ────────────────────────────────────────────────────────
window.excludeRestaurant = async function(id, name) {
  if (S.excluded.includes(id)) return;
  S.excluded.push(id);
  S.last = S.last.filter(r => r.id !== id);

  // Slide-out animation
  const card = document.getElementById(`rc-${id}`);
  if (card) {
    card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
    card.style.opacity = '0';
    card.style.transform = 'translateX(18px)';
    setTimeout(() => card.remove(), 280);
  }

  await botSay(`<strong>${name}</strong> removed — finding a replacement with the same criteria… 🔄`, 550);

  // Always find a fresh replacement using the exact same session framework
  const fresh = getSuggestions().slice(0, 1);
  if (fresh.length) {
    S.last = [...S.last, ...fresh];
    // Track replacement in cross-round history
    fresh.forEach(r => {
      if (!S.shown.includes(r.id)) S.shown.push(r.id);
      const c = r.cuisine.split('/')[0].trim().toLowerCase();
      if (!S.shownCuisines.includes(c)) S.shownCuisines.push(c);
    });
    await new Promise(ok => setTimeout(ok, 350));
    const isDinner = S.mealType === 'dinner';
    addCard(buildCard(fresh[0], isDinner));
    await botSay("New pick added above 👆 — same filters, different spot.", 500);
  } else {
    await botSay("No more matches left with your current filters. Try broadening your area or budget, or tap <strong>Start over</strong> for a fresh search.", 600);
  }
};

// ─── Scoring ──────────────────────────────────────────────────────────────────
function score(r) {
  let s = 0;

  // Meal type match
  if (S.mealType === 'lunch' && !r.mealTypes.includes('lunch')) return -1;
  if (S.mealType === 'dinner' && !r.mealTypes.includes('dinner')) return -1;

  // ── Operating hours filter ───────────────────────────────────────────────
  const openStat = getOpenStatus(r.id);
  if (openStat.status === 'closed') return -1;
  if (openStat.status === 'not-yet') {
    if (S.time === 'rushed') return -1;
    s -= 6;
  }
  if (openStat.status === 'opening-soon') s -= 2;
  if (openStat.status === 'closing-soon') {
    if (S.time === 'rushed' || S.time === 'normal') s -= 10;
    else s -= 4;
  }
  if (openStat.status === 'open') s += 2; // verified open bonus

  // ── Reservation filter ───────────────────────────────────────────────────
  const res = RESERVATION[r.id];
  if (S.planningAhead === 'now') {
    if (res && res.required) return -1;        // Can't walk into these
    if (res && res.recommended) s -= 5;        // Possible walk-in but risky
  }
  if (S.planningAhead === 'ahead') {
    if (res && res.required) s += 5;           // Showcase the best reservation spots
    if (res && res.bookUrl) s += 2;
  }

  // Area filter
  let areaSet = null;
  if (S.mealType === 'lunch' && S.areaFilter) areaSet = LUNCH_AREA_SETS[S.areaFilter];
  if (S.mealType === 'dinner' && S.areaFilter) areaSet = DINNER_AREA_SETS[S.areaFilter];
  if (areaSet && !areaSet.has(r.area)) return -1;

  // Hard dietary stops
  if (S.dietary.includes('halal') && !r.halal) return -1;
  if (S.dietary.includes('no-pork') && !r.halal) return -1;
  if (S.dietary.includes('vegetarian') && !r.veg) return -1;
  if (S.dietary.includes('vegan') && !r.vegan) return -1;
  if (S.dietary.includes('no-beef') && !r.noBeef) return -1;
  // Kosher: no certified Kosher in KL — proxy to vegetarian/vegan as practical alternative
  if (S.dietary.includes('kosher') && !r.veg && !r.vegan) return -1;
  // Gluten-free: soft signal (not hard exclude — cross-contamination risk remains; user warned separately)
  if (S.dietary.includes('gluten-free') && !r.gfFriendly) s -= 10;

  // Group size
  if (S.groupSize >= 9 && r.capacity === 'small') return -1;

  // Rating bonus
  if (r.googleRating >= 4.5) s += 10;
  else if (r.googleRating >= 4.2) s += 6;
  else if (r.googleRating >= 4.0) s += 2;
  else s -= 5;

  // Trending bonus
  s += r.trending.length * 2;

  // Time
  if (S.time === 'rushed') {
    if (r.waitPeak === 'slow') return -1;
    if (r.driveMin) return -1;
    if (r.walkMin > 12) return -1;
    if (r.waitPeak === 'fast') s += 8;
    if (PEAK.level === 'red' && r.waitPeak === 'moderate') s -= 3;
  }
  if (S.time === 'normal' && r.waitPeak === 'slow') s -= 4;
  if (S.time === 'relaxed') s += 2;

  // Budget
  const budgetCaps = { low:25, mid:S.mealType==='dinner'?100:50, high:S.mealType==='dinner'?200:90, splurge:9999 };
  if (S.budget === 'low' && r.priceNum > 25) return -1;
  if (S.budget === 'mid' && r.priceNum > budgetCaps.mid) return -1;
  if (S.budget === 'high' && r.priceNum > budgetCaps.high) s -= 3;
  if (S.budget === 'splurge' && r.priceNum > 150) s += 8;
  if (S.budget === 'low' && r.priceNum <= 15) s += 6;

  // Occasion
  if (r.bestFor.includes(S.occasion)) s += 8;

  // Craving — match gives a strong boost, mismatch gives a penalty
  // 'light' uses the healthFriendly flag rather than cuisine keywords
  if (S.craving === 'light') {
    if (r.healthy) s += 12;
    else s -= 8;
  } else {
    const cMap = {
      malaysian:['Malaysian','Kopitiam','Nyonya','Peranakan','Ipoh','Malay'],
      japanese:['Japanese','Ramen','Mazesoba','Sushi','Omakase','Wagyu','Izakaya'],
      western:['Western','BBQ','French','American','Spanish','Bistro','Tapas','Café'],
      chinese:['Chinese','Taiwanese','Dim Sum','Fujian','Hotpot'],
      korean:['Korean'],
      latin:['Latin','Peruvian'],
      bold:['Thai','Korean','Peri-Peri','Nashville','Wagyu','BBQ','Spicy','Hotpot'],
      any:[],
    };
    const keys = cMap[S.craving]||[];
    if (!keys.length) s += 2; // 'any' — no preference, small nudge
    else if (keys.some(k => r.cuisine.toLowerCase().includes(k.toLowerCase()))) s += 12;
    else s -= 10; // Mismatch: doesn't fit the craving at all
  }

  // Vibe
  if (S.vibe !== 'any') {
    if (S.vibe === 'chill' && r.vibe === 'chill') s += 5;
    if (S.vibe === 'chill' && r.vibe === 'loud') s -= 5;
    if (S.vibe === 'moderate' && r.vibe !== 'loud') s += 2;
  }

  // Group
  if (S.groupSize >= 6 && r.capacity === 'large') s += 4;
  if (S.groupSize >= 6 && r.capacity === 'small') s -= 5;

  // Peak time penalty
  if (PEAK.level === 'red' && r.waitPeak === 'slow') s -= 6;

  // Rejection adjustments
  if (S.rejections.includes('too-far') && r.driveMin > 15) s -= 12;
  if (S.rejections.includes('too-expensive') && r.priceNum > 50) s -= 10;
  if (S.rejections.includes('too-noisy') && r.vibe === 'loud') s -= 12;
  if (S.rejections.includes('too-quiet') && r.vibe === 'chill') s -= 10;
  if (S.rejections.includes('want-cheaper') && r.priceNum > 30) s -= 10;
  if (S.rejections.includes('different-cuisine')) {
    // Use the full cross-round cuisine history, and escalate penalty on repeat requests
    const diffCount = S.rejections.filter(v => v === 'different-cuisine').length;
    if (S.shownCuisines.some(c => r.cuisine.toLowerCase().startsWith(c))) {
      s -= diffCount >= 2 ? 40 : 20;
    }
  }
  // Use accumulated all-time history — prevents restaurants resurfacing after earlier rounds
  if (S.shown.includes(r.id)) s -= 50;
  if (S.excluded.includes(r.id)) return -1;

  // Proximity bonus
  if (r.walkMin && r.walkMin <= 3) s += 5;
  if (r.driveMin && r.driveMin <= 5) s += 3;

  return s;
}

function getSuggestions(grabOnly=false) {
  let pool = grabOnly ? DB.filter(r=>r.grab) : DB;
  return pool.map(r=>({r,s:score(r)})).filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s).slice(0,3).map(x=>x.r);
}

    tiktok:'<span class="sb tiktok">TikTok</span>',

    xhs:'<span class="sb xhs">小红书</span>',

  }[t]||'')).join('');

  const isWarnPeak = PEAK.level==='red' && (r.pt||'').includes('🔴');

  const ptText = isWarnPeak
    ? `⚠️ NOW BUSY: ${(r.pt||'').replace('🔴','').trim()}`

  const openStat = getOpenStatus(r.id);

  let resBanner = '';
  if (S.planningAhead === 'now' && res && res.recommended) {
    resBanner = `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:6px 9px;margin-top:7px;font-size:11.5px;color:#7a4f00">
      ⚠️ <strong>Walk-in risky:</strong> ${res.note}
    </div>`;
  }
  if (S.planningAhead === 'ahead' && res && (res.required || res.recommended)) {
    const bookBtn = res.bookUrl
      ? `<a href="${res.bookUrl}" target="_blank" style="display:inline-block;margin-top:5px;font-size:11.5px;font-weight:700;color:#fff;background:#3949ab;padding:4px 12px;border-radius:20px;text-decoration:none">📅 Book a table →</a>`
      : '';

      📅 <strong>${res.required ? 'Reservation required' : 'Booking recommended'}:</strong> ${res.note}${bookBtn}

  const menuBtn = menuMeta

  const excludeBtn = `<button onclick="excludeRestaurant(${r.id},'${r.name.replace(/'/g,"\\'")}') " style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:#999;background:none;border:1.5px solid #ddd;border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='#e57373';this.style.color='#e57373'" onmouseout="this.style.borderColor='#ddd';this.style.color='#999'">✕ Exclude</button>`;

  return `
    <div class="rc" id="rc-${r.id}">

// ─── Dish search card (adds specialty note to standard card) ─────────────────
function buildDishCard(r, specialtyNote) {
  const base = buildCard(r, r.mealTypes && !r.mealTypes.includes('lunch'));
  const highlight = `
    <div style="background:#fffbe6;border:1.5px solid #f0c040;border-radius:8px;padding:7px 10px;margin:6px 0 2px;font-size:12px;line-height:1.5">
      <span style="font-weight:700;color:#b7860a">🏆 Known for this dish:</span><br>
      <span style="color:#555">${specialtyNote}</span>
    </div>`;
  return base.replace('</div>\n    </div>', `${highlight}</div>\n    </div>`);
}

async function runDishSearch(query) {
  const match = matchDish(query);
  if (!match) {
    await botSay(`I don't have a specific match for <strong>"${query}"</strong> yet — but let me find the closest options based on cuisine. You can also try a broader term like the cuisine type.`, 700);
    // Fallback to normal suggest
    await showResults();
    return;
  }

  const validIds = match.matches.map(m => m.id);
  const candidates = DB.filter(r => validIds.includes(r.id));

  if (!candidates.length) {
    await botSay(`I know of places for <strong>${query}</strong> but they might not match your current filters (area / dietary). Try broadening your area preference.`, 700);
    await showFeedback(); return;
  }

  S.step = 'result';
  S.last = candidates;

  await botSay(`Found <strong>${candidates.length}</strong> restaurant${candidates.length > 1 ? 's' : ''} specifically known for <strong>${query}</strong> 👇`, 700);

  for (const r of candidates) {
    await new Promise(ok => setTimeout(ok, 350));
    const note = match.matches.find(m => m.id === r.id)?.note || '';
    addCard(buildDishCard(r, note));
  }

  await botSay("These spots are specifically known for that dish. Happy with the options?", 700);
  await showFeedback();
}

function showTyping(){
  const t=document.createElement('div'); t.className='typing'; t.id='typing';

}

function setQR(items,grabStyle=false) {
  qrEl.innerHTML='';
  items.forEach(item=>{
    const b=document.createElement('button');

}

// ─── Flow ─────────────────────────────────────────────────────────────────────
const ORDER_COMMON = ['groupSize','time','dietary','craving','budget','vibe'];

async function onQR(label,value) {
  // Multi-select dietary
  if (S.step==='dietary' && value!=='none') {
    if(!S.dietary.includes(value)) S.dietary.push(value);
    addMsg(label,'user'); qrEl.innerHTML='';
    if (value === 'kosher') {
      await botSay("Noted. Heads up: <strong>certified Kosher restaurants are extremely rare in Klang Valley</strong> — there are essentially none. We'll surface strictly vegetarian and vegan-friendly options as the most practical alternative. Please confirm with your guest what they're comfortable with. 🙏", 700);
    } else if (value === 'gluten-free') {
      await botSay("⚠️ <strong>Gluten hides in many Malaysian dishes</strong> — soy sauce, oyster sauce, wheat noodles, and marinades are everywhere. We'll prioritise the safest options, but please always confirm with the restaurant. Cross-contamination is a real risk in shared kitchens.", 700);
    } else {
      await botSay("Noted! Any other dietary needs?", 400);
    }
    setQR([
      {l:"✅ Halal required",v:"halal"},{l:"🌱 Vegan",v:"vegan"},
      {l:"🥦 Vegetarian",v:"vegetarian"},{l:"🚫 No pork/No lard",v:"no-pork"},
      {l:"🥩 No beef",v:"no-beef"},{l:"🌾 Gluten-free",v:"gluten-free"},
      {l:"✡️ Kosher",v:"kosher"},{l:"✅ That's all, continue",v:"none"},
    ]); return;
  }

  // Dish search branch
  if (value === 'dish-search') {
    addMsg(label,'user'); qrEl.innerHTML='';
    S.step = 'dish-search';
    await botSay(`What dish are you after? Type it in and I'll find who does it best. 👇<br><small style="color:#9aa">e.g. nasi lemak, ramen, XLB, wagyu, ribs, laksa, mazesoba…</small>`, 600);
    inpEl.placeholder = 'Type a dish name and press Enter…';
    inpEl.focus();
    return;
  }

  addMsg(label,'user'); qrEl.innerHTML='';
  S[S.step] = S.step==='groupSize' ? parseInt(value) : value;
  await advance();
}

async function advance() {
  const cur = S.step;

  if (cur==='occasion') { S.step='mealType'; await askMealType(); return; }
  if (cur==='mealType') {
    if (S.mealType==='grab-delivery') { S.step='grab-dietary'; await askGrabFlow(); return; }
    S.step='walkInOrPlan'; await askWalkIn(); return;
  }
  if (cur==='walkInOrPlan') { S.step='areaPreference'; await askAreaPref(); return; }
  if (cur==='areaPreference') { S.step='groupSize'; await askStep('groupSize'); return; }

  // Grab sub-flow
  if (cur==='grab-dietary') { S.step='grab-craving'; await askGrabCraving(); return; }
  if (cur==='grab-craving') { S.step='grab-budget'; await askGrabBudget(); return; }
  if (cur==='grab-budget') { await showGrabResults(); return; }

  // Common steps
  const idx = ORDER_COMMON.indexOf(cur);
  if (idx === -1 || idx === ORDER_COMMON.length-1) { await showResults(); return; }
  S.step = ORDER_COMMON[idx+1];
  await askStep(S.step);
}

const STEP_MSGS = {
  groupSize:{msg:"How many people are we feeding?",qr:[{l:"Just me",v:"1"},{l:"2–4 pax",v:"3"},{l:"5–8 pax",v:"6"},{l:"9+ pax",v:"10"}]},
  time:{msg:"How much time do you have?",qr:[{l:"⚡ Rushed (under 30 min)",v:"rushed"},{l:"🕐 Normal (~1 hour)",v:"normal"},{l:"😌 Relaxed (1.5 hr+)",v:"relaxed"}]},
  dietary:{msg:"Any dietary requirements? (Tap all that apply)",qr:[{l:"✅ Halal required",v:"halal"},{l:"🌱 Vegan",v:"vegan"},{l:"🥦 Vegetarian",v:"vegetarian"},{l:"🚫 No pork / No lard",v:"no-pork"},{l:"🥩 No beef",v:"no-beef"},{l:"🌾 Gluten-free",v:"gluten-free"},{l:"✡️ Kosher",v:"kosher"},{l:"✅ No restrictions",v:"none"}]},
  craving:{
    lunch:{msg:"What are you craving?",qr:[{l:"🇲🇾 Malaysian local",v:"malaysian"},{l:"🍜 Japanese",v:"japanese"},{l:"🥩 Western / Grilled",v:"western"},{l:"🥟 Chinese / Dim Sum",v:"chinese"},{l:"🌶️ Bold & flavourful",v:"bold"},{l:"🥗 Healthy / Low-cal",v:"light"},{l:"✨ Surprise me",v:"any"},{l:"🔍 I want a specific dish…",v:"dish-search"}]},
    dinner:{msg:"What kind of dinner are you after?",qr:[{l:"🇲🇾 Malaysian / Asian",v:"malaysian"},{l:"🍣 Japanese / Omakase",v:"japanese"},{l:"🥩 Western / French",v:"western"},{l:"🫕 Hotpot / BBQ",v:"bold"},{l:"🌶️ Thai / Korean",v:"korean"},{l:"🥗 Healthy / Light",v:"light"},{l:"✨ Surprise me",v:"any"},{l:"🔍 I want a specific dish…",v:"dish-search"}]},
  },
  budget:{
    lunch:{msg:"Budget per person?",qr:[{l:"💰 Under RM20",v:"low"},{l:"💳 RM20–50",v:"mid"},{l:"💎 RM50+",v:"high"}]},
    dinner:{msg:"Budget per person for dinner?",qr:[{l:"💳 RM50–100 (casual)",v:"mid"},{l:"💎 RM100–200 (premium)",v:"high"},{l:"👑 RM200+ (celebration!)",v:"splurge"}]},
  },
  vibe:{msg:"What kind of environment?",qr:[{l:"🔇 Quiet — easy to talk",v:"chill"},{l:"🎵 Some buzz is fine",v:"moderate"},{l:"🔊 Lively, don't care",v:"any"}]},
};

async function askStep(step) {
  let cfg = STEP_MSGS[step];
  if (step==='craving') cfg = S.mealType==='dinner' ? cfg.dinner : cfg.lunch;
  if (step==='budget') cfg = S.mealType==='dinner' ? cfg.dinner : cfg.lunch;
  await botSay(cfg.msg,650);
  setQR(cfg.qr);
}

async function askMealType() {
  await botSay("Is this for lunch, dinner, or do you want to order delivery via Grab?", 650);
  const mealTabsEl = document.createElement('div');
  mealTabsEl.className='meal-tabs';
  mealTabsEl.innerHTML=`
    <button class="mt-btn" onclick="pickMeal('lunch')">
      <span class="mt-icon">☀️</span>
      <span class="mt-label">Lunch</span>
      <span class="mt-sub">Walk-in / drive nearby</span>
    </button>
    <button class="mt-btn" onclick="pickMeal('dinner')">
      <span class="mt-icon">🌙</span>
      <span class="mt-label">Dinner</span>
      <span class="mt-sub">Wider KL Valley options</span>
    </button>
    <button class="mt-btn grab" onclick="pickMeal('grab-delivery')">
      <span class="mt-icon">🛵</span>
      <span class="mt-label">Grab Delivery</span>
      <span class="mt-sub">Order to your desk</span>
    </button>`;
  qrEl.appendChild(mealTabsEl);
}

window.pickMeal = async function(val) {
  const labels = {'lunch':'☀️ Lunch — dine in','dinner':'🌙 Dinner — dine in','grab-delivery':'🛵 Grab Delivery'};
  addMsg(labels[val],'user'); qrEl.innerHTML='';
  S.mealType = val; S.step = 'mealType';
  await advance();
};

async function askWalkIn() {
  const nowOpen = DB.filter(r => {
    const s = getOpenStatus(r.id);
    return s.status === 'closed' || s.status === 'not-yet';
  }).length;

  await botSay(`Are you heading out soon, or planning ahead?${nowOpen > 0 ? `<br><small style="color:#9aa">ℹ️ ${nowOpen} spots are currently closed or not yet open — I'll filter those automatically.</small>` : ''}`, 650);
  setQR([
    {l:'🚀 Heading there soon — walk-in', v:'now', fn: async () => {
      addMsg('🚀 Walk-in — heading there soon','user'); qrEl.innerHTML='';
      S.planningAhead='now'; S.step='walkInOrPlan'; await advance();
    }},
    {l:'📅 Planning ahead / making a booking', v:'ahead', fn: async () => {
      addMsg('📅 Planning ahead','user'); qrEl.innerHTML='';
      S.planningAhead='ahead'; S.step='walkInOrPlan'; await advance();
    }},
  ]);
}

async function askAreaPref() {
  if (S.mealType==='lunch') {
    await botSay("Any area preference? (You can avoid One Utama if you want something different 😄)", 650);
    setQR([
      {l:"🏬 One Utama / First Avenue",v:"one-utama-only",fn:pickArea},
      {l:"🚗 Nearby streets (avoid 1U)",v:"avoid-one-utama",fn:pickArea},
      {l:"🗺️ Either — show me the best",v:"any-nearby",fn:pickArea},
    ]);
  } else {
    await botSay("How far are you willing to go for dinner?", 650);
    setQR([
      {l:"🏘️ Stay nearby PJ / Uptown / TTDI",v:"pj-nearby",fn:pickArea},
      {l:"🌆 Open to Bangsar / KL",v:"mid-kl",fn:pickArea},
      {l:"🌃 Anywhere in KL Valley",v:"anywhere",fn:pickArea},
    ]);
  }
}

window.pickArea = async function(val) {
  const labels = {
    'one-utama-only':'🏬 One Utama / First Avenue',
    'avoid-one-utama':'🚗 Nearby streets (no 1U)',
    'any-nearby':'🗺️ Any nearby area',
    'pj-nearby':'🏘️ Staying nearby PJ',
    'mid-kl':'🌆 Bangsar / KL area',
    'anywhere':'🌃 Anywhere in KL Valley',
  };
  addMsg(labels[val]||val,'user'); qrEl.innerHTML='';
  S.areaFilter = val; S.step = 'areaPreference';
  await advance();
};

// ─── Grab sub-flow ────────────────────────────────────────────────────────────
async function askGrabFlow() {
  await botSay("Delivering to First Avenue PJ. Any dietary needs?", 650);
  setQR([
    {l:"✅ Halal only",v:"halal",fn:v=>{S.dietary=[v];S.step='grab-dietary';advance();}},
    {l:"🌱 Vegan",v:"vegan",fn:v=>{S.dietary=[v];S.step='grab-dietary';advance();}},
    {l:"🥦 Vegetarian",v:"vegetarian",fn:v=>{S.dietary=[v];S.step='grab-dietary';advance();}},
    {l:"🥩 No beef",v:"no-beef",fn:v=>{S.dietary=[v];S.step='grab-dietary';advance();}},
    {l:"No restrictions",v:"none",fn:v=>{S.step='grab-dietary';advance();}},
  ], true);
}
async function askGrabCraving() {
  await botSay("What are you craving?", 500);
  setQR([
    {l:"🇲🇾 Malaysian",v:"malaysian"},{l:"🍜 Japanese",v:"japanese"},
    {l:"🥩 Western",v:"western"},{l:"🌶️ Bold & flavourful",v:"bold"},
    {l:"✨ Surprise me",v:"any"},
  ], true);
}
async function askGrabBudget() {
  await botSay("Budget per order?", 500);
  setQR([
    {l:"💰 Under RM20",v:"low"},{l:"💳 RM20–40",v:"mid"},{l:"💎 RM40+",v:"high"},
  ], true);
}

async function showGrabResults() {
  const res = getSuggestions(true);
  S.last = res;
  res.forEach(r => {
    if (!S.shown.includes(r.id)) S.shown.push(r.id);
    const c = r.cuisine.split('/')[0].trim().toLowerCase();
    if (!S.shownCuisines.includes(c)) S.shownCuisines.push(c);
  });
  if (!res.length) {
    await botSay("I couldn't find a Grab match with those filters. Let me broaden — relaxing dietary filter slightly.", 700);
  }
  await botSay("Here are your best Grab delivery picks 🛵 Search these in the Grab app for live ETA and promos:", 700);
  addCard(buildGrabPanel(res));
  await botSay("Open Grab Food, search by restaurant name, and check for any active promo codes under the checkout screen.", 800);
  await showFeedback();
}

// ─── Show results ─────────────────────────────────────────────────────────────
async function showResults() {
  S.step = 'result';
  const isDinner = S.mealType==='dinner';
  const res = getSuggestions();
  S.last = res;
  // Accumulate cross-round history so scores stay penalised across all rounds
  res.forEach(r => {
    if (!S.shown.includes(r.id)) S.shown.push(r.id);
    const c = r.cuisine.split('/')[0].trim().toLowerCase();
    if (!S.shownCuisines.includes(c)) S.shownCuisines.push(c);
  });

  if (!res.length) {
    const exhausted = S.shown.length > 0;
    await botSay(exhausted
      ? "We've surfaced all the strong matches for your criteria — nothing genuinely new left. Try relaxing a filter or tap <strong>Start over</strong> for a fresh search."
      : "Hmm, nothing matched well with all those filters — let me adjust.", 700);
    await showFeedback(); return;
  }

  const occLabel = {'overseas-guests':'for your guests','team-outing':'for the team','daily-lunch':'for you today'}[S.occasion]||'';
  await botSay(`Here are my top picks ${occLabel} — all <strong>⭐ 4.0+ rated on Google</strong> ${isDinner?'🌙':'☀️'}`, 700);

  if (PEAK.level !== 'green') {
    await botSay(`<strong>${PEAK.label}</strong> — ${PEAK.note}`, 450);
  }

  for (const r of res) {
    await new Promise(ok=>setTimeout(ok,350));
    addCard(buildCard(r, isDinner));
  }

  await botSay("What do you think? Hit the spot?", 700);
  await showFeedback();
}

async function showFeedback() {
  S.step='feedback';
  setQR([
    {l:"✅ Perfect, thanks!",v:"happy",fn:onFeedback},
    {l:"🔍 Search a different dish",v:"dish-search-again",fn:onFeedback},
    {l:"📍 Too far away",v:"too-far",fn:onFeedback},
    {l:"💸 Too expensive",v:"too-expensive",fn:onFeedback},
    {l:"🔊 Too noisy",v:"too-noisy",fn:onFeedback},
    {l:"🔇 Too quiet",v:"too-quiet",fn:onFeedback},
    {l:"🍽️ Different cuisine",v:"different-cuisine",fn:onFeedback},
    {l:"💰 Something cheaper",v:"want-cheaper",fn:onFeedback},
    {l:"🔄 Start over",v:"reset",fn:onFeedback},
  ]);
}

async function onFeedback(value) {
  if (value==='dish-search-again') {
    addMsg('🔍 Search a different dish','user'); qrEl.innerHTML='';
    S.step = 'dish-search';
    await botSay(`What dish are you looking for this time? 👇<br><small style="color:#9aa">e.g. ramen, XLB, wagyu, ribs, laksa…</small>`, 500);
    inpEl.placeholder = 'Type a dish name and press Enter…';
    inpEl.focus(); return;
  }
  if (value==='happy') {
    await botSay("Enjoy! 🙌 Come back anytime for your next food fix.", 600);
    const w=document.createElement('div'); w.className='reset-wrap';
    w.innerHTML=`<button class="reset-btn" onclick="resetChat()">🔄 Find food again</button>`;
    chatEl.appendChild(w); scroll(); return;
  }
  if (value==='reset') { resetChat(); return; }
  S.rejections.push(value);
  const msgs={
    'too-far':'Keeping it closer this time.',
    'too-expensive':'Looking for better value.',
    'too-noisy':'Finding somewhere quieter.',
    'too-quiet':'Finding somewhere with more energy.',
    'different-cuisine':'Switching cuisine direction.',
    'want-cheaper':'Going budget-friendly.',
  };
  await botSay(msgs[value]||"Let me re-think.", 600);
  if (S.mealType==='grab-delivery') await showGrabResults();
  else await showResults();
}

// ─── Text input ───────────────────────────────────────────────────────────────
function handleSend() {
  const v=inpEl.value.trim(); if(!v) return; inpEl.value='';
  inpEl.placeholder = 'Type a message or pick above…';

  // Dish search input
  if (S.step === 'dish-search') {
    addMsg(`🔍 "${v}"`, 'user'); qrEl.innerHTML='';
    runDishSearch(v); return;
  }

  addMsg(v,'user'); qrEl.innerHTML='';
  const lv=v.toLowerCase();
  if (S.step==='feedback') {
    let val='different-cuisine';
    if(lv.match(/far|walk|close|near/))val='too-far';
    else if(lv.match(/expens|pric|cheap/))val='too-expensive';
    else if(lv.match(/nois|loud/))val='too-noisy';
    else if(lv.match(/quiet|boring|dead/))val='too-quiet';
    else if(lv.match(/good|great|perfect|thanks|yes|ok/))val='happy';
    else if(lv.match(/reset|start|again/))val='reset';
    else if(lv.match(/cheap|budget|less money/))val='want-cheaper';
    onFeedback(val); return;
  }
  botSay("Use the buttons for best results! Let me re-show the options:",500)
    .then(()=>{ if(STEP_MSGS[S.step]) askStep(S.step); });
}
inpEl.addEventListener('keydown',e=>{ if(e.key==='Enter') handleSend(); });

// ─── Reset & init ─────────────────────────────────────────────────────────────
function resetChat() {
  S={step:'occasion',occasion:null,mealType:null,planningAhead:null,areaFilter:null,groupSize:null,time:null,dietary:[],craving:null,budget:null,vibe:null,last:[],shown:[],shownCuisines:[],rejections:[],excluded:[]};
  chatEl.innerHTML=''; qrEl.innerHTML=''; startChat();
}

async function startChat() {
  const hooks = [
    `Stomach growling. Group chat stuck at <em>"anything la"</em>. Clock ticking. 😅<br><br>Skip the debate — tell me what's going on and I'll have a suggestion ready before the next message.`,
    `7 people. 7 opinions. Zero decisions. Been there. 😄<br><br>Tell me what you need and I'll cut straight to the answer.`,
    `The best spot for your situation isn't always the obvious one. Good thing I know the difference. 😏`,
    `The food's great in this area — the trick is knowing <em>which</em> great. Let me help with that.`,
  ];
  const hook = hooks[new Date().getDay() % hooks.length];
  await botSay(`${hook}<br><br>${PEAK.level!=='green'?`<span style="font-weight:600">${PEAK.label}</span> — ${PEAK.note}<br><br>`:''}What's the occasion today?`, 700);
  S.step='occasion';
  setQR([
    {l:"🌍 Hosting overseas guests",v:"overseas-guests"},
    {l:"👥 Team lunch / outing",v:"team-outing"},
    {l:"🍜 Personal lunch / dinner",v:"daily-lunch"},
  ]);
}

startChat();
</script>
